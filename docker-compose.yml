version: '3.9'

services:
  backend:
    build:
      context: ./backend
    image: data-agent-backend:latest
    container_name: data-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    restart: unless-stopped
    depends_on:
      - sandbox

  sandbox:
    build:
      context: ./backend/sandbox
    image: data-sandbox:latest
    container_name: data-sandbox-builder
    command: echo "Sandbox image built and ready"
